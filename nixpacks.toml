# Railway / Nixpacks — monorepo Node 20 (workspace)
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
# Instalar devDependencies (Nest CLI, TypeScript) para o build; NODE_ENV=production omitiria isso.
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build -w api"]

[start]
cmd = "npm run start"
