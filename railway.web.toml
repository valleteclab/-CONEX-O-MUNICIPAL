# Web service (Next.js): in Railway set this file as Config as code path: /railway.web.toml
[build]
builder = "RAILPACK"
buildCommand = "npm ci --include=dev && npm run build:web"
watchPatterns = [ "apps/web/**", "packages/**" ]

[deploy]
startCommand = "npm run start:web"
healthcheckPath = "/"
healthcheckTimeout = 100
